name: email-validate CI
on:
  push:
    paths:
      - 'modules/email-validate/**'
      - '.github/workflows/email-validate-ci.yml'
  pull_request:
    paths:
      - 'modules/email-validate/**'
      - '.github/workflows/email-validate-ci.yml'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.5'
      - run: cd modules/email-validate && go test ./...
      - run: cd modules/email-validate && go build ./...
